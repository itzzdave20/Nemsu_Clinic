services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: nemsu_clinic
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/nemsu-clinic.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${DB_ROOT_PASSWORD:-rootpass}
      DB_NAME: nemsu_clinic
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES: 7d
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SEMAPHORE_API_KEY: ${SEMAPHORE_API_KEY:-}
      SEMAPHORE_SENDER: ${SEMAPHORE_SENDER:-NEMSUC}
      REMINDER_CRON_ENABLED: ${REMINDER_CRON_ENABLED:-true}
      REMINDER_CRON_SCHEDULE: ${REMINDER_CRON_SCHEDULE:-0 8 * * *}
      REMINDER_DEFAULT_CHANNEL: ${REMINDER_DEFAULT_CHANNEL:-in_app}
    ports:
      - "5000:5000"
    command: sh -c "sleep 5 && node src/seed.js && node src/index.js"

  web:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  mysql_data:
